name: test-agent

on:
  push:
    branches: [main]
    paths: ["agent/**"]
  pull_request:
    paths: ["agent/**"]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: agent/go.sum

      - name: Run tests
        working-directory: agent
        run: go test ./... -v -count=1 -race

      - name: Build binary (verify it compiles)
        working-directory: agent
        run: GOOS=linux GOARCH=amd64 go build -o /tmp/litesoup-agent-linux-amd64 ./cmd/litesoup-agent/
