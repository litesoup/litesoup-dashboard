<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com
    AssignUserId example-user example-user
    DocumentRoot /home/example-user/webapps/example.com/public_html

    <Directory /home/example-user/webapps/example.com/public_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog /var/log/apache2/example.com_error.log
    CustomLog /var/log/apache2/example.com_access.log combined
</VirtualHost>
